apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: ecommerce
spec:
  replicas: 3
  selector:
    matchLabels: { app: catalog-service }
  template:
    metadata:
      labels: { app: catalog-service, version: stable }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8000" }
    spec:
      containers:
        - name: catalog
          image: catalog-service:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: db-credentials, key: url } }
            - name: REDIS_URL
              valueFrom: { configMapKeyRef: { name: app-config, key: redis_url } }
